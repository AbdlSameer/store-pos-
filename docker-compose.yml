version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: toystore_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: toystore
      POSTGRES_PASSWORD: toystore_dev_pass
      POSTGRES_DB: toystore_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U toystore -d toystore_db']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: toystore_redis
    restart: unless-stopped
    command: redis-server --requirepass redis_dev_pass
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', 'redis_dev_pass', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: toystore_server
    restart: unless-stopped
    ports:
      - '4000:4000'
    env_file:
      - .env.example
    environment:
      - DATABASE_URL=postgresql://toystore:toystore_dev_pass@postgres:5432/toystore_db
      - REDIS_URL=redis://:redis_dev_pass@redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  client:
    build:
      context: .
      dockerfile: apps/client/Dockerfile
    container_name: toystore_client
    restart: unless-stopped
    ports:
      - '5173:80'
    depends_on:
      - server

volumes:
  postgres_data:
  redis_data:
